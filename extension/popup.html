<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font: 14px/1.5 "Newsreader", "Iowan Old Style", Georgia, serif;
      margin: 0; padding: 16px; width: 270px;
      background: #fffaf0; color: #1f1a14;
    }
    h1 {
      font-size: 17px; font-weight: 600; margin: 0 0 6px;
      color: #8a4a26; letter-spacing: -0.01em;
    }
    #status { color: #4a3f30; }
    #warning { color: #6e2e2e; margin-top: 8px; display: none; }
    button {
      margin-top: 12px; width: 100%;
      font: 600 13px "Newsreader", Georgia, serif;
      padding: 8px 12px; border-radius: 7px; border: none; cursor: pointer;
      background: #f2ecdb; color: #1f1a14;
      box-shadow: inset 0 1px 0 rgba(255, 250, 235, 0.6), inset 0 -1px 0 rgba(120, 95, 60, 0.10);
    }
    button:hover { background: #ebe4cd; }
    button:active { transform: translateY(1px); }
  </style>
</head>
<body>
  <h1>Cockatoo</h1>
  <div id="status">Checking…</div>
  <div id="warning">Cockatoo isn't running — progress is being saved locally and will sync when it's back.</div>
  <button id="open">Open Cockatoo</button>
  <script src="build/popup.js"></script>
</body>
</html>
