<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup-shell">
    <header class="brand-row">
      <div class="brand">
        <!-- Exact compact-bust geometry shared with BrandMark.swift and the
             deterministic app-icon renderer; adaptive fills keep it legible
             in both popup appearances. -->
        <svg class="brand-mark" viewBox="0 0 100 100" aria-hidden="true">
          <g class="brand-mark-crest">
            <path d="M38 20 C49 20 54 27 54 36 C54 45 48 50 38 50 C42 42 43 29 38 20 Z" />
            <path d="M51 22 C37 19 22 12 12 3 C10 12 19 24 38 31 C44 32 49 28 51 22 Z" />
            <path d="M47 29 C31 29 17 24 6 16 C8 28 20 37 39 39 C44 38 47 34 47 29 Z" />
            <path d="M42 37 C28 40 16 38 7 32 C12 44 25 49 40 46 C43 43 44 40 42 37 Z" />
          </g>
          <path class="brand-mark-body" d="M29 92 C34 78 36 62 36 45 C36 29 43 18 55 14 C69 10 80 18 83 31 C85 38 84 43 80 48 C76 53 73 59 73 65 C72 73 75 84 79 92 C65 98 43 98 29 92 Z" />
          <path class="brand-mark-beak" d="M78 40 C84 36 91 39 93 46 C95 53 91 61 84 69 C85 64 82 59 78 58 C74 59 71 56 72 51 C72 46 75 42 78 40 Z" />
          <circle class="brand-mark-eye" cx="69" cy="36" r="3" />
        </svg>
        <span>COCKATOO</span>
      </div>
      <div class="connection" aria-live="polite">
        <span id="connection-dot" class="connection-dot checking" aria-hidden="true"></span>
        <span id="connection-label">Checking</span>
      </div>
    </header>

    <section class="language-block" aria-labelledby="language">
      <p class="eyebrow">CURRENT LANGUAGE</p>
      <h1 id="language">Language pack</h1>
      <p id="status" class="status-copy">Checking your library…</p>
    </section>

    <section id="stats" class="stats" aria-label="Learning overview" hidden>
      <div class="stat"><strong id="due-stat">0</strong><span>Due now</span></div>
      <div class="stat"><strong id="new-stat">0</strong><span>New</span></div>
      <div class="stat"><strong id="library-stat">0</strong><span>Library</span></div>
      <div class="stat"><strong id="known-stat">0</strong><span>Known</span></div>
    </section>

    <p id="warning" class="warning" role="status" hidden>
      The app is closed. Browsing events stay on this Mac and will sync next time Cockatoo opens.
    </p>

    <div class="actions">
      <button id="practice" class="button primary" hidden>Practice words</button>
      <button id="open" class="button secondary">Open Cockatoo</button>
    </div>

    <p id="sync-detail" class="sync-detail"></p>
  </main>
  <script type="module" src="build/popup.js"></script>
</body>
</html>
