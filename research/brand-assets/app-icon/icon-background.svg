<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <!-- Cockatoo app-icon tile: Apple Big Sur icon grid (824/1024 squircle,
       the OS draws the drop shadow), graphite gradient, faint gold rim.
       SVG rx is a circular approximation of the continuous corner. -->
  <defs>
    <linearGradient id="graphite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#252527"/>
      <stop offset="1" stop-color="#131314"/>
    </linearGradient>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="180" fill="url(#graphite)"/>
  <rect x="103" y="103" width="818" height="818" rx="177"
        fill="none" stroke="#F2C53A" stroke-opacity="0.18" stroke-width="6"/>
</svg>
